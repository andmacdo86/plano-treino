<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>🏊 Plano Treino 12 Semanas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: linear-gradient(160deg, #0a1628 0%, #0D7377 50%, #14A0C4 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #fff;
    padding-bottom: 100px;
  }
  button { cursor: pointer; font-family: inherit; }

  .header {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    position: sticky; top: 0; z-index: 100;
  }
  .header-sub { font-size: 11px; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 21px; font-weight: bold; }
  .progress-bar-wrap { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
  .progress-bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { font-size: 12px; opacity: 0.8; white-space: nowrap; }

  .nav { display: flex; gap: 8px; padding: 14px 16px 0; }
  .nav-btn { flex: 1; padding: 9px 4px; border-radius: 10px; border: none; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); font-size: 13px; transition: all 0.2s; }
  .nav-btn.active { background: rgba(255,255,255,0.95); color: #0D7377; font-weight: bold; }

  .notif {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    color: #fff; padding: 10px 20px; border-radius: 99px;
    font-size: 14px; font-weight: bold; z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    animation: fadeIn 0.2s ease; white-space: nowrap;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

  .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; }

  .week-selector { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .week-arrow { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; transition: all 0.2s; }
  .week-arrow:disabled { opacity: 0.25; cursor: not-allowed; }
  .week-center { text-align: center; }
  .week-title { font-size: 20px; font-weight: bold; }
  .week-phase { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 10px; }
  .status-ok    { background: rgba(76,175,80,0.2);   border: 1px solid rgba(76,175,80,0.5);   color: #81C784; }
  .status-warn  { background: rgba(255,193,7,0.2);   border: 1px solid rgba(255,193,7,0.5);   color: #FFD54F; }
  .status-block { background: rgba(244,67,54,0.2);   border: 1px solid rgba(244,67,54,0.5);   color: #EF9A9A; }
  .status-done  { background: rgba(76,175,80,0.3);   border: 1px solid rgba(76,175,80,0.6);   color: #A5D6A7; }
  .status-lock  { background: rgba(100,100,100,0.2); border: 1px solid rgba(150,150,150,0.4); color: #aaa; }

  .threshold-wrap { margin-top: 10px; }
  .threshold-label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.75; margin-bottom: 6px; }
  input[type=range] { width: 100%; accent-color: #14A0C4; }

  .day-btn { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 12px 16px; text-align: left; color: #fff; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; margin-bottom: 2px; }
  .day-btn.expanded { border-radius: 14px 14px 0 0; background: rgba(255,255,255,0.18); }
  .day-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: bold; transition: background 0.3s; flex-shrink: 0; }
  .day-icon.done { background: #4CAF50; }
  .day-info { margin-left: 12px; flex: 1; }
  .day-name { font-weight: bold; font-size: 15px; }
  .day-sub { font-size: 12px; opacity: 0.65; margin-top: 1px; }
  .day-right { display: flex; align-items: center; gap: 8px; }

  .session-panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); border-top: none; border-radius: 0 0 14px 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .session-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 14px; transition: all 0.2s; display: flex; align-items: flex-start; justify-content: space-between; }
  .session-card.done { background: rgba(76,175,80,0.15); border-color: rgba(76,175,80,0.4); }
  .session-badge { font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 6px; }
  .session-label { font-weight: bold; font-size: 15px; margin-bottom: 6px; display: block; }
  .session-desc { font-size: 13px; opacity: 0.8; line-height: 1.4; }
  .session-desc-item { padding-left: 8px; border-left: 2px solid rgba(255,255,255,0.2); margin-bottom: 3px; }
  .check-btn { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); color: #fff; font-size: 18px; flex-shrink: 0; margin-left: 10px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .check-btn.done { background: #4CAF50; border-color: #4CAF50; }

  .debt-panel { background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .debt-title { font-weight: bold; font-size: 14px; color: #FFD54F; margin-bottom: 10px; }
  .debt-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.07); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .debt-item:last-child { margin-bottom: 0; }
  .debt-check { background: rgba(255,193,7,0.2); border: 2px solid rgba(255,193,7,0.5); border-radius: 8px; width: 36px; height: 36px; color: #FFD54F; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .debt-check.done { background: #4CAF50; border-color: #4CAF50; color: #fff; }

  .phase-header { border-radius: 12px 12px 0 0; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .phase-body { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-top: none; border-radius: 0 0 12px 12px; margin-bottom: 16px; }
  .week-row { padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .week-row:last-child { border-bottom: none; }
  .week-num { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; color: rgba(255,255,255,0.7); flex-shrink: 0; }
  .week-num.done { background: #4CAF50; color: #fff; }
  .week-num.warn { background: #FF9800; color: #fff; }
  .week-num.lock { background: rgba(80,80,80,0.3); color: #666; }
  .mini-bar-bg { height: 5px; background: rgba(255,255,255,0.12); border-radius: 99px; overflow: hidden; margin-top: 4px; }
  .mini-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: rgba(255,255,255,0.09); border-radius: 14px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.12); }
  .stat-icon { font-size: 22px; }
  .stat-value { font-size: 24px; font-weight: bold; margin-top: 4px; }
  .stat-label { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .milestone { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .milestone-dot { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .milestone-dot.done { background: #4CAF50; border-color: #4CAF50; }
  .milestone-dot.goal { background: rgba(255,215,0,0.2); border-color: #FFD700; }
  .reset-btn { width: 100%; margin-top: 14px; padding: 12px; background: rgba(255,50,50,0.12); border: 1px solid rgba(255,50,50,0.25); border-radius: 12px; color: rgba(255,100,100,0.9); font-size: 14px; }

  .advance-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: bold; margin-bottom: 10px; transition: all 0.2s; }
  .advance-ok   { background: #4CAF50; color: #fff; }
  .advance-warn { background: #FF9800; color: #fff; }
  .advance-lock { background: rgba(100,100,100,0.3); color: #888; cursor: not-allowed; }

  .info-box { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 12px 14px; font-size: 13px; opacity: 0.85; line-height: 1.6; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }

  .page { padding: 14px 16px 0; display: none; }
  .page.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">Plano 12 Semanas — Elástico</div>
  <div class="header-title">🏊 Natação + 💪 Calistenia</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="globalBar" style="width:0%;background:#4CAF50"></div>
    </div>
    <span class="progress-label" id="globalLabel">Semana 1 de 12</span>
  </div>
</div>

<div class="notif" id="notif" style="display:none"></div>

<div class="nav">
  <button class="nav-btn active" onclick="showView('week')">Semana</button>
  <button class="nav-btn" onclick="showView('overview')">Visão Geral</button>
  <button class="nav-btn" onclick="showView('progress')">Progresso</button>
</div>

<div class="page active" id="view-week">
  <div class="card" style="margin-top:14px">
    <div class="week-selector">
      <button class="week-arrow" id="btnPrev" onclick="changeWeek(-1)">‹</button>
      <div class="week-center">
        <div class="week-title" id="weekTitle">Semana 1</div>
        <div class="week-phase" id="weekPhase"></div>
      </div>
      <button class="week-arrow" id="btnNext" onclick="changeWeek(1)">›</button>
    </div>
    <div id="weekStatusBadge"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="weekBar" style="width:0%"></div>
      </div>
      <span class="progress-label" id="weekLabel">0/0</span>
    </div>
    <div class="threshold-wrap">
      <div class="threshold-label">
        <span>Meta mínima: <strong id="thresholdVal">70%</strong></span>
        <span id="thresholdNeeded"></span>
      </div>
      <input type="range" id="thresholdSlider" min="50" max="100" step="5" value="70" oninput="updateThreshold(this.value)">
    </div>
  </div>
  <div id="debtPanel"></div>
  <div id="advancePanel"></div>
  <div id="dayList"></div>
</div>

<div class="page" id="view-overview">
  <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:0.6;margin:14px 0 12px">12 Semanas — Plano Elástico</div>
  <div class="info-box">📅 O plano avança conforme você conclui cada semana — sem datas fixas. Faltou? Compensa e segue em frente!</div>
  <div id="overviewList"></div>
</div>

<div class="page" id="view-progress">
  <div class="stats-grid" style="margin-top:14px" id="statsGrid"></div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <span style="font-weight:bold">Progresso Geral</span>
      <span style="opacity:0.7;font-size:14px" id="progressTotal"></span>
    </div>
    <div class="progress-bar-bg" style="height:12px">
      <div class="progress-bar-fill" id="progressBar" style="width:0%;background:linear-gradient(90deg,#0D7377,#14A0C4,#4CAF50)"></div>
    </div>
  </div>
  <div class="card">
    <div style="font-weight:bold;margin-bottom:14px">🏆 Marcos da Jornada</div>
    <div id="milestones"></div>
  </div>
  <button class="reset-btn" onclick="resetProgress()">🗑 Resetar progresso</button>
</div>

<script>
const NATACAO={1:"5×2min | +1min pausa | Foco: braçada consistente",2:"5×2min | +1min pausa | Varie crawl/costas",3:"5×2min | +1min pausa | Aumente o ritmo",4:"6×2,5min | +45s pausa | 2 costas + 4 crawl",5:"6×2,5min | +45s pausa | Aumente cadência",6:"6×2,5min | +45s pausa | Foco na técnica",7:"5×4min | +1min pausa | +1 sprint 30s ao final",8:"5×4min | +1min pausa | +1 sprint 30s",9:"4×5min | +1min pausa | +2 sprints ao final",10:"4×5min | +1min pausa | +2 sprints",11:"4×5min | +1min pausa | Técnica + resistência",12:"4×5min | +1min pausa | Sessão de performance total"};
const CALISTENIA={1:["Dead hang 3×20s","Scapular pull 3×8","Flexão joelho 3×10","Prancha 3×30s","Knee raise 3×8"],2:["Dead hang 3×25s","Scapular pull 3×8","Flexão joelho 3×12","Prancha 3×35s","Knee raise 3×10"],3:["Dead hang 3×30s","Scapular pull 3×10","Flexão 3×10","Prancha 3×40s","Knee raise 3×12"],4:["Dead hang 3×35s","Scapular pull 3×10","Flexão 3×12","Prancha larga 2×8","Knee raise 3×12"],5:["Scapular pull 3×10","Negativa barra 4×3 (5s)","Flexão 4×10","Prancha lateral 3×25s","Knee raise 3×12"],6:["Scapular pull 3×10","Negativa barra 4×4 (5s)","Flexão 4×12","Prancha lateral 3×30s","Knee raise 3×15"],7:["Scapular pull 3×10","Negativa barra 4×5 (5s)","Flexão elevada 2×8","Prancha 3×45s","Knee raise 3×15"],8:["Scapular pull 3×10","Negativa barra 4×5 (6s)","Flexão elevada 3×8","Prancha 3×45s","L-sit 3×15s"],9:["Negativa 4×5 (7s)","Barra c/ elástico 4×3","Scapular pull 2×10","Dead hang máximo","Knee raise 3×15"],10:["Negativa 4×5 (7s)","Barra c/ elástico 4×4","Flexão elevada 4×10","Prancha 3×45s","Dragon flag 3×3"],11:["Negativa 4×5 (8s)","Barra c/ elástico 4×5","Flexão diamante 3×8","Prancha 3×50s","Dragon flag 3×3"],12:["Negativa 4×5 (8s)","BARRA COMPLETA — tente!","Flexão diamante 3×10","Prancha 3×60s","Dragon flag 3×5"]};
const PHASES=[{name:"FASE 1",label:"Adaptação",weeks:[1,2,3,4],color:"#0D7377"},{name:"FASE 2",label:"Construção",weeks:[5,6,7,8],color:"#14A0C4"},{name:"FASE 3",label:"Performance",weeks:[9,10,11,12],color:"#1B2A4A"}];
const DAY_NAMES=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];

function getWeekSessions(w){return[{day:0,period:"manhã",type:"swim",label:"🏊 Natação",desc:[NATACAO[w]]},{day:0,period:"noite",type:"cali",label:"💪 Calistenia",desc:CALISTENIA[w]},{day:1,period:"manhã",type:"swim",label:"🏊 Natação",desc:[NATACAO[w]]},{day:1,period:"noite",type:"rest",label:"😴 Recuperação",desc:["Alongamento e mobilidade 15 min"]},{day:2,period:"manhã",type:"swim",label:"🏊 Natação",desc:[NATACAO[w]]},{day:2,period:"noite",type:"cali",label:"💪 Calistenia",desc:CALISTENIA[w]},{day:3,period:"manhã",type:"swim",label:"🏊 Natação",desc:[NATACAO[w]]},{day:3,period:"noite",type:"rest",label:"😴 Recuperação",desc:["Alongamento e mobilidade 15 min"]},{day:4,period:"manhã",type:"swim",label:"🏊 Natação",desc:[NATACAO[w]]},{day:4,period:"noite",type:"cali",label:"💪 Calistenia",desc:CALISTENIA[w]},{day:5,period:"dia",type:"off",label:"🏖 Descanso ativo",desc:["Caminhada ou mobilidade leve"]},{day:6,period:"dia",type:"off",label:"🏖 Descanso total",desc:["Recuperação completa"]}];}
function getPhase(w){return PHASES.find(p=>p.weeks.includes(w))||PHASES[0];}
function sessionKey(w,d,p){return`w${w}_d${d}_${p}`;}
function debtKey(w,d,p){return`debt_w${w}_d${d}_${p}`;}
function getCheckable(w){return getWeekSessions(w).filter(s=>s.type!=="off");}
function getProgress(w){const s=getCheckable(w);const done=s.filter(s=>checks[sessionKey(w,s.day,s.period)]).length;return{done,total:s.length,pct:s.length?Math.round((done/s.length)*100):0};}

let currentWeek=1,expandedDay=null,threshold=70,checks={},debtChecks={},unlockedUpTo=1;

function loadState(){try{const s=JSON.parse(localStorage.getItem("treino_v2")||"{}");checks=s.checks||{};debtChecks=s.debtChecks||{};threshold=s.threshold||70;unlockedUpTo=s.unlockedUpTo||1;currentWeek=s.currentWeek||1;}catch{}}
function saveState(){try{localStorage.setItem("treino_v2",JSON.stringify({checks,debtChecks,threshold,unlockedUpTo,currentWeek}));}catch{}}
loadState();

function weekStatus(w){if(w>unlockedUpTo)return'locked';const{pct}=getProgress(w);if(w<unlockedUpTo)return'completed';if(pct>=threshold)return'ok';if(pct>=50)return'warn';if(pct>0)return'block';return'inprogress';}
function canView(w){return w<=unlockedUpTo;}

function showView(v){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));document.getElementById("view-"+v).classList.add("active");const map={week:0,overview:1,progress:2};document.querySelectorAll(".nav-btn")[map[v]].classList.add("active");if(v==="week")renderWeek();if(v==="overview")renderOverview();if(v==="progress")renderProgress();}

function changeWeek(d){const nw=currentWeek+d;if(nw<1||nw>12)return;if(nw>unlockedUpTo){showNotif("🔒 Complete a semana atual primeiro!","#E53935");return;}currentWeek=nw;expandedDay=null;saveState();renderWeek();}

function updateThreshold(v){threshold=parseInt(v);document.getElementById("thresholdVal").textContent=threshold+"%";saveState();renderWeek();}

function advanceWeek(){const{pct,total}=getProgress(currentWeek);if(pct<50){showNotif("🔒 Complete pelo menos 50% para avançar!","#E53935");return;}
  if(pct<threshold){if(!confirm(`Avançar com ${total-Math.round(total*pct/100)} treino(s) em débito? Eles aparecerão para compensação.`))return;}
  const missed=getCheckable(currentWeek).filter(s=>!checks[sessionKey(currentWeek,s.day,s.period)]);
  missed.forEach(s=>{const k=debtKey(currentWeek,s.day,s.period);debtChecks[k]=false;});
  if(currentWeek<12){unlockedUpTo=Math.max(unlockedUpTo,currentWeek+1);currentWeek++;expandedDay=null;saveState();showNotif("🎉 Semana "+(currentWeek-1)+" concluída! Avançando...","#4CAF50");setTimeout(()=>renderWeek(),300);}
  else{showNotif("🏆 Plano completo! Você conseguiu!","#FFD700");}}

function toggleDebt(w,d,p){const k=debtKey(w,d,p);debtChecks[k]=!debtChecks[k];saveState();renderWeek();if(debtChecks[k])showNotif("✅ Débito compensado!","#4CAF50");}

function renderWeek(){
  const phase=getPhase(currentWeek);
  const{done,total,pct}=getProgress(currentWeek);
  const needed=Math.ceil(total*threshold/100);
  const status=weekStatus(currentWeek);

  document.getElementById("weekTitle").textContent=`Semana ${currentWeek}`;
  document.getElementById("weekPhase").textContent=`${phase.name} — ${phase.label}`;
  document.getElementById("weekPhase").style.color=phase.color==="#1B2A4A"?"#14A0C4":phase.color;
  document.getElementById("thresholdSlider").value=threshold;
  document.getElementById("thresholdVal").textContent=threshold+"%";
  const falta=Math.max(0,needed-done);
  document.getElementById("thresholdNeeded").textContent=falta>0?`Faltam ${falta} treino${falta>1?"s":""}`:done===total?"Perfeito! 🎉":"Meta atingida ✅";

  let barColor=pct>=threshold?"#4CAF50":pct>=50?"#FF9800":pct>0?"#E53935":"#14A0C4";
  document.getElementById("weekBar").style.width=pct+"%";
  document.getElementById("weekBar").style.background=barColor;
  document.getElementById("weekLabel").textContent=`${done}/${total} (${pct}%)`;

  let badgeHtml="";
  if(status==="completed")badgeHtml=`<span class="status-badge status-done">✅ Semana já concluída</span>`;
  else if(pct>=100)badgeHtml=`<span class="status-badge status-ok">🏆 Semana perfeita! Avance!</span>`;
  else if(pct>=threshold)badgeHtml=`<span class="status-badge status-ok">✅ Meta atingida — pode avançar!</span>`;
  else if(pct>=50)badgeHtml=`<span class="status-badge status-warn">⚠️ Abaixo da meta — avance com débito</span>`;
  else if(done>0)badgeHtml=`<span class="status-badge status-block">🔴 Complete mais treinos para avançar</span>`;
  else badgeHtml=`<span class="status-badge status-lock">📋 Semana em andamento</span>`;
  document.getElementById("weekStatusBadge").innerHTML=badgeHtml;

  document.getElementById("btnPrev").disabled=currentWeek<=1;
  document.getElementById("btnNext").disabled=currentWeek>=unlockedUpTo;
  updateGlobal();

  // DEBTS
  const pendingDebts=[];
  for(const k in debtChecks){if(debtChecks[k]===false){const m=k.match(/debt_w(\d+)_d(\d+)_(.+)/);if(m){const dw=parseInt(m[1]),dd=parseInt(m[2]),dp=m[3];const sess=getWeekSessions(dw).find(s=>s.day===dd&&s.period===dp);if(sess)pendingDebts.push({k,w:dw,d:dd,p:dp,sess});}}}
  let debtHtml="";
  if(pendingDebts.length>0){
    debtHtml=`<div class="debt-panel"><div class="debt-title">⚠️ Treinos em débito (${pendingDebts.length})</div>`;
    for(const{w,d,p,sess}of pendingDebts){debtHtml+=`<div class="debt-item"><div><div style="font-size:13px;font-weight:bold">${sess.label}</div><div style="font-size:11px;opacity:0.6">Semana ${w} — ${DAY_NAMES[d]}</div></div><button class="debt-check" onclick="toggleDebt(${w},${d},'${p}')">✓</button></div>`;}
    debtHtml+=`</div>`;
  }
  document.getElementById("debtPanel").innerHTML=debtHtml;

  // ADVANCE
  let advHtml="";
  if(status!=="completed"){
    if(pct>=threshold)advHtml=`<button class="advance-btn advance-ok" onclick="advanceWeek()">✅ Concluir Semana ${currentWeek} e Avançar →</button>`;
    else if(pct>=50)advHtml=`<button class="advance-btn advance-warn" onclick="advanceWeek()">⚠️ Avançar com débito (${total-done} pendente${total-done>1?"s":""})</button>`;
    else advHtml=`<button class="advance-btn advance-lock" disabled>🔒 Complete pelo menos 50% para avançar</button>`;
  }else{advHtml=`<div style="text-align:center;opacity:0.6;font-size:13px;margin-bottom:10px">✅ Semana já concluída — use as setas para navegar</div>`;}
  document.getElementById("advancePanel").innerHTML=advHtml;

  // DAYS
  const sessions=getWeekSessions(currentWeek);
  let html="";
  for(let di=0;di<7;di++){
    const ds=sessions.filter(s=>s.day===di);
    const isExp=expandedDay===di;
    const dDone=ds.filter(s=>s.type!=="off"&&checks[sessionKey(currentWeek,s.day,s.period)]).length;
    const dTotal=ds.filter(s=>s.type!=="off").length;
    const allOff=ds.every(s=>s.type==="off");
    const allDone=dTotal>0&&dDone===dTotal;
    html+=`<button class="day-btn${isExp?" expanded":""}" onclick="toggleDay(${di})"><div style="display:flex;align-items:center;flex:1"><div class="day-icon${allDone?" done":""}">${allOff?"🏖":(allDone?"✅":DAY_NAMES[di].substring(0,3))}</div><div class="day-info"><div class="day-name">${DAY_NAMES[di]}</div><div class="day-sub">${allOff?"Descanso":ds.map(s=>s.label).join(" • ")}</div></div></div><div class="day-right">${!allOff?`<span style="font-size:12px;opacity:0.7">${dDone}/${dTotal}</span>`:""}<span style="opacity:0.4;font-size:16px">${isExp?"▲":"▼"}</span></div></button>`;
    if(isExp){
      html+=`<div class="session-panel">`;
      for(const sess of ds){
        const key=sessionKey(currentWeek,sess.day,sess.period);
        const isDone=checks[key];
        const isOff=sess.type==="off"||sess.type==="rest";
        const tc={swim:"#14A0C4",cali:"#0D7377",rest:"#6B8CAE",off:"#B0C4DE"};
        const c=tc[sess.type]||"#888";
        html+=`<div class="session-card${isDone?" done":""}"><div class="session-content"><span class="session-badge" style="background:${c}33;color:${c};border:1px solid ${c}55">${sess.period}</span><span class="session-label">${sess.label}</span><div>`;
        if(sess.desc.length>1){for(const d of sess.desc)html+=`<div class="session-desc session-desc-item">${d}</div>`;}
        else html+=`<div class="session-desc">${sess.desc[0]}</div>`;
        html+=`</div></div>`;
        if(!isOff)html+=`<button class="check-btn${isDone?" done":""}" onclick="toggleCheck(${currentWeek},${sess.day},'${sess.period}')">${isDone?"✓":""}</button>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }
  }
  document.getElementById("dayList").innerHTML=html;
}

function toggleDay(d){expandedDay=expandedDay===d?null:d;renderWeek();}
function toggleCheck(w,d,p){const key=sessionKey(w,d,p);checks[key]=!checks[key];saveState();if(checks[key])showNotif("✅ Treino marcado!","#4CAF50");renderWeek();}

function renderOverview(){
  const si={completed:"✅",ok:"✅",warn:"⚠️",block:"🔴",inprogress:"📋",locked:"🔒"};
  const nc={completed:"done",ok:"done",warn:"warn",block:"",inprogress:"",locked:"lock"};
  let html="";
  for(const phase of PHASES){
    html+=`<div><div class="phase-header" style="background:${phase.color}"><div><div style="font-weight:bold;font-size:15px">${phase.name} — ${phase.label}</div><div style="font-size:11px;opacity:0.75">Semanas ${phase.weeks[0]}–${phase.weeks[phase.weeks.length-1]}</div></div></div><div class="phase-body">`;
    for(let i=0;i<phase.weeks.length;i++){
      const w=phase.weeks[i];const{done,total,pct}=getProgress(w);const st=weekStatus(w);const cv=canView(w);
      html+=`<div class="week-row${cv?" clickable":""}" ${cv?`onclick="currentWeek=${w};expandedDay=null;showView('week')"`:""} style="${i===phase.weeks.length-1?"border-bottom:none":""}${!cv?";opacity:0.35":""}"><div class="week-num ${nc[st]||""}">${cv?(si[st]||w):"🔒"}</div><div style="flex:1"><div style="font-size:14px;font-weight:bold">Semana ${w}</div><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${pct}%;background:${pct>=threshold?"#4CAF50":pct>=50?"#FF9800":phase.color}"></div></div></div><div style="font-size:12px;opacity:0.65;margin:0 8px">${cv?`${done}/${total}`:"—"}</div><div style="opacity:0.4">${cv?"›":"🔒"}</div></div>`;
    }
    html+=`</div></div>`;
  }
  document.getElementById("overviewList").innerHTML=html;
}

function renderProgress(){
  const totalSessions=Array.from({length:12},(_,i)=>i+1).flatMap(w=>getCheckable(w)).length;
  const totalDone=Object.values(checks).filter(Boolean).length;
  const pct=Math.round((totalDone/totalSessions)*100);
  const totalDebts=Object.values(debtChecks).length;
  const paidDebts=Object.values(debtChecks).filter(Boolean).length;
  document.getElementById("statsGrid").innerHTML=`<div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${totalDone}</div><div class="stat-label">Sessões feitas</div></div><div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value">${pct}%</div><div class="stat-label">% Completo</div></div><div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value">${unlockedUpTo}/12</div><div class="stat-label">Semanas avançadas</div></div><div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value">${paidDebts}/${totalDebts}</div><div class="stat-label">Débitos pagos</div></div>`;
  document.getElementById("progressTotal").textContent=`${totalDone}/${totalSessions} sessões`;
  document.getElementById("progressBar").style.width=pct+"%";
  const milestones=[{label:"Primeira semana concluída",done:unlockedUpTo>1},{label:"Primeira negativa na barra",note:"Semana 5",done:unlockedUpTo>=5},{label:"Fase 1 concluída (4 semanas)",done:unlockedUpTo>4},{label:"Fase 2 concluída (8 semanas)",done:unlockedUpTo>8},{label:"10 barras completas! 🎉",done:false,isGoal:true}];
  let mHtml="";
  for(const m of milestones)mHtml+=`<div class="milestone"><div class="milestone-dot${m.done?" done":m.isGoal?" goal":""}">${m.done?"✓":m.isGoal?"🏆":""}</div><div><div style="font-size:14px;font-weight:${m.isGoal?"bold":"normal"}">${m.label}</div>${m.note?`<div style="font-size:12px;opacity:0.55">${m.note}</div>`:""}</div></div>`;
  document.getElementById("milestones").innerHTML=mHtml;
}

function updateGlobal(){document.getElementById("globalBar").style.width=((unlockedUpTo-1)/12*100)+"%";document.getElementById("globalLabel").textContent=`Semana ${unlockedUpTo} de 12`;}

function showNotif(msg,color="#4CAF50"){const n=document.getElementById("notif");n.textContent=msg;n.style.background=color;n.style.display="block";setTimeout(()=>n.style.display="none",2500);}

function resetProgress(){if(confirm("Zerar todo o progresso?")){ checks={};debtChecks={};unlockedUpTo=1;currentWeek=1;expandedDay=null;saveState();renderWeek();updateGlobal();}}

renderWeek();updateGlobal();
</script>
</body>
</html>
